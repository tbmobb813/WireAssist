# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Install, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies (pnpm, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # Exclude synqagent (Tauri desktop) — frozen, tsc not green; vitest still runs below
        run: pnpm -r --filter '!synqagent' build

      - name: Run package tests (sequential, non-synqagent)
        # Sequential avoids jest worker contention across packages.
        run: pnpm -r --workspace-concurrency=1 --filter '!synqagent' --if-present test

      - name: Run synqagent tests (no threads, avoids CI hang)
        run: pnpm --filter synqagent --if-present test:ci

      - name: Coverage (core)
        run: pnpm --filter @wireassist/core test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: wireassist/core/coverage/coverage-final.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: Playwright (command-center)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm -r --filter '!synqagent' build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm e2e
