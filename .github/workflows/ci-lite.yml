# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Lite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

jobs:
  quick-check:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack and pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        # Root script excludes synqagent (Tauri frontend); desktop typecheck is optional
        run: pnpm typecheck
